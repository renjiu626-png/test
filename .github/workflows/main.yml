name: Sync Unstructured Image
on: [workflow_dispatch] # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }} # 你的 DockerHub 用户名
          password: ${{ secrets.DOCKERHUB_TOKEN }}    # 你的 DockerHub Access Token
      - name: Pull and Push
        run: |
          docker pull downloads.unstructured.io/unstructured-io/unstructured-api:latest
          docker tag downloads.unstructured.io/unstructured-io/unstructured-api:latest ${{ secrets.DOCKERHUB_USERNAME }}/unstructured-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/unstructured-api:latest
